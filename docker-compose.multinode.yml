# ──────────────────────────────────────────────────────────────────────────────
# Multi-node deployment: 3-node Cassandra cluster + 3-broker Kafka cluster.
#
#   Cassandra : NetworkTopologyStrategy, RF=3, GossipingPropertyFileSnitch,
#               single DC (datacenter1), 3 racks. Client uses QUORUM.
#   Kafka     : 3 brokers, topic users_created RF=3 / 6 partitions,
#               min.insync.replicas=2, producer acks=all.
#
# This file is SEPARATE from docker-compose.yml (single-node demo) on purpose:
#   - keeps the working single-node stack intact and reversible
#   - all app code is env-driven, so the SAME spark_stream.py / kafka_stream.py
#     run against either topology depending on the env vars set below.
#
# RESOURCE WARNING: needs ~12 GB given to Docker. Raise Docker Desktop memory
# (Settings → Resources → Memory) to at least 12 GB before `up`. Control-center
# and schema-registry are intentionally dropped (unused) to save RAM.
#
#   docker compose -f docker-compose.multinode.yml up -d
# ──────────────────────────────────────────────────────────────────────────────
version: '3'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    hostname: zookeeper
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ['CMD', 'bash', '-c', "echo 'ruok' | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - confluent

  # ── Kafka: 3 brokers ──────────────────────────────────────────────────────────
  broker-1: &kafka-broker
    image: confluentinc/cp-kafka:7.4.0
    hostname: broker-1
    container_name: broker-1
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment: &kafka-env
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker-1:29092,PLAINTEXT_HOST://localhost:9092
      # Cluster-wide replication defaults — every internal + new topic is RF=3.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD", "bash", "-c", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
    networks:
      - confluent

  broker-2:
    <<: *kafka-broker
    hostname: broker-2
    container_name: broker-2
    ports:
      - "9093:9092"
    environment:
      <<: *kafka-env
      KAFKA_BROKER_ID: 2
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker-2:29092,PLAINTEXT_HOST://localhost:9093

  broker-3:
    <<: *kafka-broker
    hostname: broker-3
    container_name: broker-3
    ports:
      - "9094:9092"
    environment:
      <<: *kafka-env
      KAFKA_BROKER_ID: 3
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker-3:29092,PLAINTEXT_HOST://localhost:9094

  kafka-init:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      broker-1:
        condition: service_healthy
      broker-2:
        condition: service_healthy
      broker-3:
        condition: service_healthy
    entrypoint: [ '/bin/bash', '-c' ]
    command: |
      "kafka-topics --bootstrap-server broker-1:29092 --create --if-not-exists \
        --topic users_created --partitions 6 --replication-factor 3 \
        --config min.insync.replicas=2 && \
      echo '--- users_created topic (RF=3, 6 partitions) ---' && \
      kafka-topics --bootstrap-server broker-1:29092 --describe --topic users_created"
    networks:
      - confluent

  # ── Cassandra: 3 nodes, NetworkTopologyStrategy-ready (DC=datacenter1) ─────────
  # Nodes bootstrap ONE AT A TIME (depends_on: service_healthy chain). Cassandra
  # requires sequential joins — parallel joins corrupt token ownership.
  cassandra-1: &cassandra-node
    image: cassandra:4.1
    hostname: cassandra-1
    container_name: cassandra-1
    ports:
      - "9042:9042"
    environment: &cassandra-env
      CASSANDRA_CLUSTER_NAME: pipeline-cluster
      CASSANDRA_SEEDS: cassandra-1,cassandra-2
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_DC: datacenter1
      CASSANDRA_RACK: rack1
      CASSANDRA_NUM_TOKENS: 16
      MAX_HEAP_SIZE: 1024M
      HEAP_NEWSIZE: 256M
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -q '^UN' && cqlsh -e 'describe cluster' >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s
    networks:
      - confluent

  cassandra-2:
    <<: *cassandra-node
    hostname: cassandra-2
    container_name: cassandra-2
    ports:
      - "9043:9042"
    depends_on:
      cassandra-1:
        condition: service_healthy
    environment:
      <<: *cassandra-env
      CASSANDRA_RACK: rack2

  cassandra-3:
    <<: *cassandra-node
    hostname: cassandra-3
    container_name: cassandra-3
    ports:
      - "9044:9042"
    depends_on:
      cassandra-2:
        condition: service_healthy
    environment:
      <<: *cassandra-env
      CASSANDRA_RACK: rack3

  # ── PostgreSQL: streaming replication (primary + 1 hot-standby read replica) ──
  # Primary keeps hostname `postgres` so Airflow's SQLAlchemy conn is unchanged.
  # Replica is a read-only hot standby streaming WAL from the primary on 5433.
  postgres:
    image: bitnamilegacy/postgresql:14
    container_name: postgres
    hostname: postgres
    ports:
      - "5544:5432"
    environment:
      - POSTGRESQL_REPLICATION_MODE=master
      - POSTGRESQL_REPLICATION_USER=repluser
      - POSTGRESQL_REPLICATION_PASSWORD=replpass
      - POSTGRESQL_USERNAME=airflow
      - POSTGRESQL_PASSWORD=airflow
      - POSTGRESQL_DATABASE=airflow
      - POSTGRESQL_POSTGRES_PASSWORD=airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - confluent

  postgres-replica:
    image: bitnamilegacy/postgresql:14
    container_name: postgres-replica
    hostname: postgres-replica
    ports:
      - "5545:5432"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - POSTGRESQL_REPLICATION_MODE=slave
      - POSTGRESQL_REPLICATION_USER=repluser
      - POSTGRESQL_REPLICATION_PASSWORD=replpass
      - POSTGRESQL_MASTER_HOST=postgres
      - POSTGRESQL_MASTER_PORT_NUMBER=5432
      - POSTGRESQL_USERNAME=airflow
      - POSTGRESQL_PASSWORD=airflow
      - POSTGRESQL_POSTGRES_PASSWORD=airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - confluent

  # ── Spark ─────────────────────────────────────────────────────────────────────
  spark-master:
    image: bitnami/spark:latest
    container_name: spark-master
    command: bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "9090:8080"
      - "7077:7077"
    volumes:
      - spark_checkpoint:/opt/spark/checkpoint
    networks:
      - confluent

  spark-worker:
    image: bitnami/spark:latest
    command: bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master
    environment:
      SPARK_MODE: worker
      SPARK_WORKER_CORES: 2
      SPARK_WORKER_MEMORY: 1g
      SPARK_MASTER_URL: spark://spark-master:7077
    networks:
      - confluent

  spark-submit:
    image: bitnami/spark:latest
    container_name: spark-submit
    depends_on:
      - spark-master
      - spark-worker
      - cassandra-3
      - kafka-init
    environment:
      # App reads these — drives multi-node Cassandra + QUORUM + 3-broker Kafka.
      CASSANDRA_HOSTS: cassandra-1,cassandra-2,cassandra-3
      CASSANDRA_REPLICATION_STRATEGY: NetworkTopologyStrategy
      CASSANDRA_REPLICATION_FACTOR: "3"
      CASSANDRA_DC: datacenter1
      KAFKA_BOOTSTRAP: broker-1:29092,broker-2:29092,broker-3:29092
    volumes:
      - ./spark_stream.py:/opt/bitnami/spark/jobs/spark_stream.py
      - spark_checkpoint:/opt/spark/checkpoint
    command: >
      spark-submit
        --master spark://spark-master:7077
        --packages com.datastax.spark:spark-cassandra-connector_2.13:3.4.1,org.apache.spark:spark-sql-kafka-0-10_2.13:3.4.1
        --conf spark.cassandra.connection.host=cassandra-1,cassandra-2,cassandra-3
        --conf spark.cassandra.output.consistency.level=QUORUM
        --conf spark.cassandra.input.consistency.level=QUORUM
        --conf spark.sql.shuffle.partitions=6
        /opt/bitnami/spark/jobs/spark_stream.py
    networks:
      - confluent

  # ── Airflow ───────────────────────────────────────────────────────────────────
  webserver:
    image: apache/airflow:2.6.0-python3.9
    command: webserver
    entrypoint: ['/opt/airflow/script/entrypoint.sh']
    depends_on:
      - postgres
    environment:
      - LOAD_EX=n
      - EXECUTOR=Sequential
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - AIRFLOW_WEBSERVER_SECRET_KEY=this_is_a_very_secured_key
      - KAFKA_INJECT_FAILURE_RATE=0.0
      - KAFKA_BOOTSTRAP=broker-1:29092,broker-2:29092,broker-3:29092
      - KAFKA_ACKS=all
    volumes:
      - ./dags:/opt/airflow/dags
      - ./script/entrypoint.sh:/opt/airflow/script/entrypoint.sh
      - ./requirements.txt:/opt/airflow/requirements.txt
    ports:
      - "8080:8080"
    healthcheck:
      test: ['CMD-SHELL', "[ -f /opt/airflow/airflow-webserver.pid ]"]
      interval: 30s
      timeout: 30s
      retries: 3
    networks:
      - confluent

  scheduler:
    image: apache/airflow:2.6.0-python3.9
    depends_on:
      webserver:
        condition: service_healthy
    volumes:
      - ./dags:/opt/airflow/dags
      - ./script/entrypoint.sh:/opt/airflow/script/entrypoint.sh
      - ./requirements.txt:/opt/airflow/requirements.txt
    environment:
      - LOAD_EX=n
      - EXECUTOR=Sequential
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - AIRFLOW_WEBSERVER_SECRET_KEY=this_is_a_very_secured_key
      - KAFKA_INJECT_FAILURE_RATE=0.0
      - KAFKA_BOOTSTRAP=broker-1:29092,broker-2:29092,broker-3:29092
      - KAFKA_ACKS=all
    command: bash -c "pip install -r ./requirements.txt && airflow db upgrade && airflow scheduler"
    networks:
      - confluent

networks:
  confluent:

volumes:
  spark_checkpoint:
